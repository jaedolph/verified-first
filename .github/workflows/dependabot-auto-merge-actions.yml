name: Auto-merge Dependabot github-actions PRs

on:
  pull_request:
    branches: ["main"]
    paths: [".github/**"]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          for i in {1..3}; do
            gh pr merge --rebase "$PR_URL" && break
            [ $i -lt 3 ] && sleep $((15 + RANDOM % 15)) || exit 1
          done
