name: Auto-merge Dependabot pip and docker PRs

on:
  workflow_run:
    workflows: ["Run tox tests"]
    types: [completed]
    branches:
      - "dependabot/pip/**"
      - "dependabot/docker/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get PR URL
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url=$(gh api "repos/${{ github.repository }}/pulls" \
            --method GET \
            -f state=open \
            -f head="${{ github.event.workflow_run.head_repository.owner.login }}:${{ github.event.workflow_run.head_branch }}" \
            --jq '.[0].html_url')
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in {1..3}; do
            gh pr merge --rebase "${{ steps.pr.outputs.url }}" && break
            [ $i -lt 3 ] && sleep $((15 + RANDOM % 15)) || exit 1
          done
