
name: Build and push Docker image

on:
  release:
    types: [published]

permissions:
  contents: read
  security-events: write

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: "{{defaultContext}}:ebs"
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: jaedolph/verifiedfirst:${{github.ref_name }},jaedolph/verifiedfirst:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'jaedolph/verifiedfirst:${{github.ref_name}}'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  deploy_test:
    name: Deploy latest image to verifiedfirst-test
    runs-on: ubuntu-latest
    needs: push_to_registry
    steps:
      - name: Pull and restart verifiedfirst-test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: podman
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            podman pull docker.io/jaedolph/verifiedfirst:latest
            XDG_RUNTIME_DIR=/run/user/2001 systemctl --user restart container-verifiedfirst-test.service
