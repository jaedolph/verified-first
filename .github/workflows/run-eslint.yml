name: Run ESLint on javascript

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "eslint.config.js"
      - "package.json"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "eslint.config.js"
      - "package.json"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
