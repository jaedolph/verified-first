name: Run frontend tests

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "package.json"
      - "vite.config.js"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "package.json"
      - "vite.config.js"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
