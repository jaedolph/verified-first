name: Create zip of frontend files

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to build (e.g. v0.4.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  zip-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Package frontend
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          cd dist && zip -r "../verified-first-${VERSION}.zip" .
      - name: Attach zip to release
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          gh release upload "${VERSION}" "verified-first-${VERSION}.zip"
        env:
          GH_TOKEN: ${{ github.token }}
